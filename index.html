<!DOCTYPE html>
<html>
<head>
    <title>39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; text-align: center; padding: 50px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 18px; color: #666; margin-bottom: 30px; }
        button { padding: 12px 28px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        .btn-primary { background: #00BEA5; color: white; }
        .btn-outline { background: transparent; color: #00BEA5; border: 2px solid #00BEA5; }
        .paper-card { background: #f9f9f9; padding: 15px; margin: 15px 0; border-radius: 10px; text-align: left; }
        .paper-title { font-weight: bold; }
        .footer { margin-top: 30px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>39 Quantum</h1>
        <p>Publish. Verify. Fund. The future of quantum research on Algorand.</p>
        
        <button class="btn-primary" id="connectBtn">Connect Wallet</button>
        <button class="btn-outline" id="submitBtn">Submit Thesis</button>
        <button class="btn-outline" id="viewBtn">View Papers</button>
        
        <h2 style="margin-top: 30px;">Recent Papers</h2>
        <div id="papersList">Loading...</div>
        
        <div class="footer">
            <p>© 2026 39 Quantum · Built on Algorand</p>
            <p><a href="https://github.com/39-q" target="_blank" style="color: #00BEA5;">GitHub</a> | Twitter</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/client@1.8.0/dist/umd/index.min.js"></script>
    <script>
        let userAddress = null;
        let walletConnector = null;
        const API_URL = 'https://three9-quantum.onrender.com/api/research';

        // Connect Wallet
        document.getElementById('connectBtn').onclick = async function() {
            try {
                // Create WalletConnect connector
                walletConnector = new WalletConnect.default({
                    bridge: 'https://bridge.walletconnect.org',
                    chainId: 416002
                });
                
                if (!walletConnector.connected) {
                    await walletConnector.createSession();
                    const qrUrl = walletConnector.uri;
                    
                    // Show QR code in a simple modal
                    const modal = document.createElement('div');
                    modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:9999;';
                    modal.innerHTML = `
                        <div style="background:white; padding:30px; border-radius:20px; text-align:center;">
                            <h3>Scan with Pera Wallet</h3>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}" style="margin:20px 0;">
                            <p>Open Pera Wallet → Scan QR code</p>
                            <button id="closeModal" style="margin-top:20px;">Close</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    document.getElementById('closeModal').onclick = () => modal.remove();
                }
                
                walletConnector.on('connect', (error, payload) => {
                    if (error) {
                        alert('Connection failed: ' + error.message);
                        return;
                    }
                    // Close modal if still open
                    const modal = document.querySelector('div[style*="position:fixed"]');
                    if (modal) modal.remove();
                    
                    userAddress = payload.params[0].accounts[0];
                    document.getElementById('connectBtn').textContent = userAddress.slice(0,6) + '...';
                    document.getElementById('connectBtn').disabled = true;
                    alert('Connected: ' + userAddress.slice(0,6) + '...');
                });
                
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        // Load Papers
        async function loadPapers() {
            try {
                const res = await fetch(API_URL);
                const papers = await res.json();
                const container = document.getElementById('papersList');
                if (papers.length === 0) {
                    container.innerHTML = '<div class="paper-card">No papers yet. Be the first!</div>';
                    return;
                }
                container.innerHTML = papers.slice(0,5).map(p => `
                    <div class="paper-card">
                        <div class="paper-title">${p.title}</div>
                        <div class="paper-authors">${p.authors || 'Anonymous'}</div>
                        <div>${(p.abstract || '').substring(0,150)}...</div>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('papersList').innerHTML = 'Error loading papers'; }
        }

        // Submit Thesis
        document.getElementById('submitBtn').onclick = async () => {
            if (!userAddress) { alert('Connect wallet first'); return; }
            const title = prompt('Title:'); if (!title) return;
            const authors = prompt('Authors:'); if (!authors) return;
            const abstract = prompt('Abstract:'); if (!abstract) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, authors, abstract, authorWallet: userAddress })
                });
                alert(res.ok ? 'Submitted!' : 'Failed');
                if (res.ok) loadPapers();
            } catch(e) { alert('Error'); }
        };

        // View Papers
        document.getElementById('viewBtn').onclick = () => loadPapers();

        loadPapers();
    </script>
</body>
</html>
