<!DOCTYPE html>
<html>
<head>
    <title>39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #000807; font-family: 'Courier New', monospace; }
        nav a { margin-left: 1.5rem; text-decoration: none; color: #666; }
        nav a:hover { color: #00BEA5; }
        .hero { text-align: center; margin: 3rem 0; }
        .hero h1 { font-size: 48px; margin-bottom: 1rem; color: #1a1a1a; }
        .hero p { font-size: 18px; color: #666; max-width: 600px; margin: 0 auto 2rem auto; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 28px; font-size: 16px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #00BEA5; color: white; }
        .btn-primary:hover { background: #009B87; transform: translateY(-1px); }
        .btn-outline { background: transparent; color: #00BEA5; border: 2px solid #00BEA5; }
        .btn-outline:hover { background: #00BEA5; color: white; }
        .papers { margin-top: 3rem; }
        .papers h2 { margin-bottom: 1.5rem; font-size: 24px; }
        .paper-card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .paper-title { font-weight: bold; font-size: 18px; margin-bottom: 0.25rem; }
        .paper-authors { font-size: 14px; color: #666; margin-bottom: 0.5rem; }
        .paper-abstract { font-size: 14px; color: #444; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #ddd; color: #666; font-size: 12px; }
        .timestamp-btn { background: #f0f0f0; color: #333; padding: 4px 12px; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">39 Quantum</div>
            <nav><a href="#">Papers</a></nav>
        </header>

        <div class="hero">
            <h1>Publish. Verify. Fund.</h1>
            <p>The future of quantum research on Base. Upload your thesis, get AI summaries, and timestamp on-chain.</p>
            <div class="btn-group">
                <button class="btn-primary" id="connectBtn">Connect Wallet</button>
                <button class="btn-outline" id="submitBtn">Submit Thesis</button>
                <button class="btn-outline" id="viewBtn">View Papers</button>
            </div>
        </div>

        <div class="papers">
            <h2>Recent Papers</h2>
            <div id="papersList">Loading papers...</div>
        </div>
        
        <div class="footer">
            <p>© 2026 39 Quantum · Built on Base</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com/39-q" target="_blank" style="color: #00BEA5; text-decoration: none; margin: 0 10px;">GitHub</a>
                <a href="#" style="color: #00BEA5; text-decoration: none; margin: 0 10px;">Twitter</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script>
        let userAddress = null;
        let provider = null;
        let signer = null;
        const API_URL = 'https://three9-quantum.onrender.com/api/research';

        // Connect MetaMask
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('Please install MetaMask first');
                window.open('https://metamask.io/download/', '_blank');
                return;
            }
            
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                signer = await provider.getSigner();
                
                // Switch to Base network
                await switchToBaseNetwork();
                
                const connectBtn = document.getElementById('connectBtn');
                connectBtn.textContent = userAddress.slice(0,6) + '...' + userAddress.slice(-4);
                connectBtn.disabled = true;
                alert('Wallet connected to Base!');
            } catch (error) {
                alert('Connection failed: ' + error.message);
            }
        }

        async function switchToBaseNetwork() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x2105' }] // Base Mainnet
                });
            } catch (error) {
                if (error.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainName: 'Base',
                            chainId: '0x2105',
                            nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                            rpcUrls: ['https://mainnet.base.org'],
                            blockExplorerUrls: ['https://basescan.org']
                        }]
                    });
                }
            }
        }

        // Submit thesis data to backend
        async function submitThesisToBackend(paperData) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(paperData)
            });
            return response.json();
        }

        // Create timestamp transaction on Base
        async function createBaseTimestamp(paperId, contentHash) {
            if (!signer) {
                alert('Please connect wallet first');
                return null;
            }
            
            try {
                // Create metadata for the timestamp
                const metadata = JSON.stringify({
                    type: 'THESIS_TIMESTAMP',
                    paperId: paperId,
                    hash: contentHash,
                    platform: '39 Quantum',
                    timestamp: Date.now()
                });
                
                // Send 0 ETH transaction to self with data
                const tx = await signer.sendTransaction({
                    to: userAddress,
                    value: 0,
                    data: ethers.toUtf8Bytes(metadata)
                });
                
                await tx.wait();
                return tx.hash;
            } catch (error) {
                console.error('Timestamp error:', error);
                alert('Failed to create timestamp: ' + error.message);
                return null;
            }
        }

        // Submit full thesis with timestamp
        document.getElementById('submitBtn').onclick = async () => {
            if (!userAddress) {
                alert('Please connect your wallet first');
                return;
            }
            
            const title = prompt('Enter thesis title:');
            if (!title) return;
            const authors = prompt('Enter author names:');
            if (!authors) return;
            const abstract = prompt('Enter abstract:');
            if (!abstract) return;
            const fundingUrl = prompt('Funding URL (optional):') || '';
            
            // Generate content hash
            const contentHash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(abstract));
            const hashHex = Array.from(new Uint8Array(contentHash)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
            
            // Create timestamp (user pays gas fees)
            const txHash = await createBaseTimestamp(Date.now(), hashHex);
            
            if (!txHash) {
                alert('Timestamp creation failed. Thesis not submitted.');
                return;
            }
            
            // Submit to backend
            const newPaper = { 
                title, authors, abstract, fundingUrl, 
                authorWallet: userAddress, 
                txHash: txHash,
                contentHash: hashHex
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPaper)
                });
                if (response.ok) {
                    alert('✅ Thesis submitted and timestamped on Base!\nTransaction: ' + txHash.slice(0,10) + '...');
                    loadPapers();
                } else {
                    alert('❌ Submission failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        // View Papers
        document.getElementById('viewBtn').onclick = () => loadPapers();

        // Load papers from backend
        async function loadPapers() {
            const papersDiv = document.getElementById('papersList');
            papersDiv.innerHTML = 'Loading...';
            try {
                const response = await fetch(API_URL);
                const papers = await response.json();
                if (papers.length === 0) {
                    papersDiv.innerHTML = '<div class="paper-card">No papers yet. Be the first to submit!</div>';
                    return;
                }
                papersDiv.innerHTML = papers.slice(0, 10).map(paper => `
                    <div class="paper-card">
                        <div class="paper-title">${escapeHtml(paper.title)}</div>
                        <div class="paper-authors">${paper.authors || 'Anonymous'} ${paper.institution ? `· ${paper.institution}` : ''}</div>
                        <div class="paper-abstract">${escapeHtml(paper.abstract?.substring(0, 200) || '')}...</div>
                        ${paper.txHash ? `<div><a href="https://basescan.org/tx/${paper.txHash}" target="_blank" style="font-size:12px; color:#00BEA5;">🔗 View on BaseScan</a></div>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                papersDiv.innerHTML = '<div class="paper-card">Error loading papers.</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('connectBtn').onclick = connectWallet;
        loadPapers();
    </script>
</body>
</html>
