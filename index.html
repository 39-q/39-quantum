<!DOCTYPE html>
<html>
<head>
    <title>39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #ddd;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #000807;
            font-family: 'Courier New', monospace;
        }

        nav a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #666;
        }

        nav a:hover {
            color: #00BEA5;
        }

        .hero {
            text-align: center;
            margin: 3rem 0;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #00BEA5;
            color: white;
        }

        .btn-primary:hover {
            background: #009B87;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: #00BEA5;
            border: 2px solid #00BEA5;
        }

        .btn-outline:hover {
            background: #00BEA5;
            color: white;
        }

        .papers {
            margin-top: 3rem;
        }

        .papers h2 {
            margin-bottom: 1.5rem;
            font-size: 24px;
        }

        .paper-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .paper-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 0.25rem;
        }

        .paper-authors {
            font-size: 14px;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .paper-abstract {
            font-size: 14px;
            color: #444;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">39 Quantum</div>
            <nav>
                <a href="#">Papers</a>
            </nav>
        </header>

        <div class="hero">
            <h1>Publish. Verify. Fund.</h1>
            <p>The future of quantum research on Algorand. Upload your thesis, get AI summaries, and receive immutable timestamps.</p>
            <div class="btn-group">
                <button class="btn-primary" id="connectBtn">Connect Wallet</button>
                <button class="btn-outline" id="submitBtn">Submit Thesis</button>
                <button class="btn-outline" id="viewBtn">View Papers</button>
            </div>
        </div>

        <div class="papers">
            <h2>Recent Papers</h2>
            <div id="papersList">Loading papers...</div>
        </div>
        
        <div class="footer">
            <p>© 2026 39 Quantum · Built on Algorand</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com/39-q" target="_blank" style="color: #00BEA5; text-decoration: none; margin: 0 10px;">GitHub</a>
                <a href="#" style="color: #00BEA5; text-decoration: none; margin: 0 10px;">Twitter</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/client@1.8.0/dist/umd/index.min.js"></script>
    <script>
        let userAddress = null;
        let connector = null;
        const API_URL = 'https://three9-quantum.onrender.com/api/research';

        // Connect Wallet function
        async function connectWallet() {
            try {
                connector = new WalletConnect.default({
                    bridge: 'https://bridge.walletconnect.org',
                    chainId: 4160
                });

                if (!connector.connected) {
                    await connector.createSession();
                    const qrUrl = connector.uri;
                    
                    // Create QR modal
                    const modalDiv = document.createElement('div');
                    modalDiv.id = 'wcModal';
                    modalDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:flex; justify-content:center; align-items:center;';
                    modalDiv.innerHTML = `
                        <div style="background:white; padding:25px; border-radius:16px; text-align:center; max-width:300px;">
                            <h3 style="margin-bottom:15px;">Scan with Pera Wallet</h3>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}" style="width:200px; height:200px; margin:10px 0;">
                            <p style="margin:15px 0; font-size:14px;">Open Pera Wallet → Scan QR code</p>
                            <button id="closeModalBtn" style="padding:8px 20px; background:#00BEA5; color:white; border:none; border-radius:8px; cursor:pointer;">Close</button>
                        </div>
                    `;
                    document.body.appendChild(modalDiv);
                    document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
                }

                connector.on('connect', (error, payload) => {
                    if (error) {
                        alert('Connection failed: ' + error.message);
                        return;
                    }
                    const modal = document.getElementById('wcModal');
                    if (modal) modal.remove();
                    
                    userAddress = payload.params[0].accounts[0];
                    const connectBtn = document.getElementById('connectBtn');
                    connectBtn.textContent = userAddress.slice(0,6) + '...' + userAddress.slice(-4);
                    connectBtn.disabled = true;
                    alert('Wallet connected!');
                });
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        // Load papers
        async function loadPapers() {
            const papersDiv = document.getElementById('papersList');
            papersDiv.innerHTML = 'Loading...';
            try {
                const response = await fetch(API_URL);
                const papers = await response.json();
                if (papers.length === 0) {
                    papersDiv.innerHTML = '<div class="paper-card">No papers yet. Be the first to submit!</div>';
                    return;
                }
                papersDiv.innerHTML = papers.slice(0, 10).map(paper => `
                    <div class="paper-card">
                        <div class="paper-title">${escapeHtml(paper.title)}</div>
                        <div class="paper-authors">${paper.authors || 'Anonymous'} ${paper.institution ? `· ${paper.institution}` : ''}</div>
                        <div class="paper-abstract">${escapeHtml(paper.abstract?.substring(0, 200) || '')}...</div>
                    </div>
                `).join('');
            } catch (error) {
                papersDiv.innerHTML = '<div class="paper-card">Error loading papers. Backend may be starting up.</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Submit Thesis
        document.getElementById('submitBtn').onclick = async () => {
            if (!userAddress) {
                alert('Please connect your wallet first');
                return;
            }
            const title = prompt('Enter thesis title:');
            if (!title) return;
            const authors = prompt('Enter author names:');
            if (!authors) return;
            const abstract = prompt('Enter abstract:');
            if (!abstract) return;
            const fundingUrl = prompt('Funding URL (optional):') || '';

            const newPaper = { title, authors, abstract, fundingUrl, authorWallet: userAddress };
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPaper)
                });
                if (response.ok) {
                    alert('Thesis submitted successfully!');
                    loadPapers();
                } else {
                    alert('Submission failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        // View Papers
        document.getElementById('viewBtn').onclick = () => {
            loadPapers();
        };

        // Connect Wallet button
        document.getElementById('connectBtn').onclick = connectWallet;

        // Load papers when page loads
        loadPapers();
    </script>
</body>
</html>
