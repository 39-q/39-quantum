<!DOCTYPE html>
<html>
<head>
    <title>New Topic - 39 Quantum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">39 Quantum</a>
            <nav>
                <a href="/" class="nav-btn">Explore</a>
                <a href="/explanations.html" class="nav-btn">Explanations</a>
                <a href="/forum.html" class="nav-btn">Forum</a>
                <a href="/new-topic.html" class="nav-btn">New Topic</a>
            </nav>
        </header>

        <h1>Start New Discussion</h1>
        <p>Share a question, idea, or paper discussion with the quantum community.</p>

        <form id="topicForm">
            <div class="form-group">
                <label for="title">Topic Title</label>
                <input type="text" id="title" placeholder="e.g., Understanding Quantum Error Correction" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="general">General Discussion</option>
                    <option value="paper_discussion">Paper Discussion</option>
                    <option value="question">Question</option>
                    <option value="resource">Resource</option>
                </select>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" rows="10" placeholder="Write your topic here..." required></textarea>
            </div>
            <div class="form-group">
                <label for="author">Your Name</label>
                <input type="text" id="author" placeholder="Anonymous">
            </div>
            <button type="submit" class="btn-primary">Publish Topic</button>
        </form>

        <a href="/forum.html">← Back to Forum</a>
    </div>

    <script>
        document.getElementById('topicForm').onsubmit = async function(e) {
            e.preventDefault();

            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                author_name: document.getElementById('author').value || 'Anonymous',
                category: document.getElementById('category').value
            };

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Publishing...';
            submitBtn.disabled = true;

            try {
                const token = localStorage.getItem('session');

                const response = await fetch('/api/topics', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('✅ Topic published!');
                    window.location.href = '/forum.html';
                } else {
                    const error = await response.json();
                    alert('❌ Failed: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                submitBtn.textContent = 'Publish Topic';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
