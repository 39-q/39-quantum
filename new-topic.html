<!DOCTYPE html>
<html>
<head>
    <title>New Topic - 39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f8f9fa; color: #1a1a1a; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e5e5; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #1a2a3a; text-decoration: none; font-family: 'Courier New', Courier, monospace; }
        nav a { margin-left: 1.5rem; text-decoration: none; color: #4a5568; }
        nav a:hover { color: #1a2a3a; }
        h1 { margin-bottom: 0.5rem; }
        .subtitle { color: #6b7280; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; font-family: inherit; }
        .form-group textarea { min-height: 200px; resize: vertical; }
        .btn { display: inline-block; background: #1a2a3a; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #2c3e50; }
        .btn-secondary { background: #e5e5e5; color: #1a1a1a; }
        .btn-secondary:hover { background: #d1d5db; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e5e5e5; color: #6b7280; font-size: 0.8rem; }
        .nav-btn {
    display: inline-block;
    background: #1a2a3a;
    color: white;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
    margin-left: 0.5rem;
    font-size: 0.9rem;
}

.nav-btn:hover {
    background: #2c3e50;
    color: white;
}

.btn-primary {
    display: inline-block;
    background: #1a2a3a;
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
}

.btn-primary:hover {
    background: #2c3e50;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">39 Quantum</a>
            <nav>
    <a href="/" class="nav-btn">Explore</a>
    <a href="/explanations.html" class="nav-btn">Explanations</a>
    <a href="/forum.html" class="nav-btn">Forum</a>
    <a href="/new-topic.html" class="nav-btn">New Topic</a>
           </nav>
        </header>

        <h1>Start New Discussion</h1>
        <p class="subtitle">Share a question, idea, or paper discussion with the quantum community.</p>

        <form id="topicForm">
            <div class="form-group">
                <label for="title">Topic Title</label>
                <input type="text" id="title" placeholder="e.g., Understanding Quantum Error Correction" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="general">General Discussion</option>
                    <option value="paper_discussion">Paper Discussion</option>
                    <option value="question">Question</option>
                    <option value="resource">Resource</option>
                </select>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" placeholder="Write your topic here. Be clear and specific." required></textarea>
            </div>
            <div class="form-group">
                <label for="author">Your Name</label>
                <input type="text" id="author" placeholder="Anonymous">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn">Publish Topic</button>
                <a href="/forum.html" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <div class="footer">
            <p>© 2026 39 Quantum · Read. Publish. Explain.</p>
        </div>
    </div>

    <script>
        document.getElementById('topicForm').onsubmit = async function(e) {
            e.preventDefault();

            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                author_name: document.getElementById('author').value || 'Anonymous',
                category: document.getElementById('category').value
            };

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Publishing...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/topics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('✅ Topic published successfully!');
                    window.location.href = '/forum.html';
                } else {
                    const error = await response.json();
                    alert('❌ Failed to publish: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                submitBtn.textContent = 'Publish Topic';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
