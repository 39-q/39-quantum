<!DOCTYPE html>
<html>
<head>
    <title>Forum - 39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f8f9fa; color: #1a1a1a; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e5e5; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #1a2a3a; text-decoration: none; font-family: 'Courier New', Courier, monospace; }
        nav a { margin-left: 1.5rem; text-decoration: none; color: #4a5568; }
        nav a:hover { color: #1a2a3a; }
        h1 { margin-bottom: 0.5rem; }
        .subtitle { color: #6b7280; margin-bottom: 2rem; }
        .topic-card { background: white; border: 1px solid #e5e5e5; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .topic-card h3 { margin-bottom: 0.5rem; }
        .topic-card h3 a { color: #1a2a3a; text-decoration: none; }
        .topic-card h3 a:hover { text-decoration: underline; }
        .topic-meta { color: #6b7280; font-size: 0.85rem; }
        .topic-meta span { margin-right: 1rem; }
        .btn { display: inline-block; background: #1a2a3a; color: white; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .btn:hover { background: #2c3e50; }
        .btn-outline { background: transparent; color: #1a2a3a; border: 1px solid #1a2a3a; }
        .btn-outline:hover { background: #1a2a3a; color: white; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e5e5e5; color: #6b7280; font-size: 0.8rem; }
        .category-badge { display: inline-block; font-size: 0.75rem; padding: 0.15rem 0.6rem; border-radius: 12px; background: #e5e5e5; color: #4a5568; }
        .empty-state { text-align: center; padding: 3rem; color: #6b7280; }
        .nav-btn {
    display: inline-block;
    background: #1a2a3a;
    color: white;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
    margin-left: 0.5rem;
    font-size: 0.9rem;
}

.nav-btn:hover {
    background: #2c3e50;
    color: white;
}

.btn-primary {
    display: inline-block;
    background: #1a2a3a;
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
}

.btn-primary:hover {
    background: #2c3e50;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">39 Quantum</a>
            <nav>
    <a href="/" class="nav-btn">Explore</a>
    <a href="/explanations.html" class="nav-btn">Explanations</a>
    <a href="/forum.html" class="nav-btn">Forum</a>
    <a href="/new-topic.html" class="nav-btn">New Topic</a>
           </nav>
        </header>

        <h1>Forum</h1>
        <p class="subtitle">Discuss quantum computing papers, topics, and ideas with the community.</p>

        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <a href="/new-topic.html" class="btn">Start New Discussion</a>
            <div>
                <a href="/forum.html?category=general" class="btn-outline" style="padding: 0.4rem 0.8rem; margin-right: 0.5rem; font-size: 0.85rem;">General</a>
                <a href="/forum.html?category=paper_discussion" class="btn-outline" style="padding: 0.4rem 0.8rem; margin-right: 0.5rem; font-size: 0.85rem;">Papers</a>
                <a href="/forum.html?category=question" class="btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Questions</a>
            </div>
        </div>

        <div id="topicsList">Loading topics...</div>

        <div class="footer">
            <p>© 2026 39 Quantum · Read. Publish. Explain.</p>
        </div>
    </div>

    <script>
        const API_URL = '/api/topics';

        function getCategoryBadge(category) {
            const labels = {
                'general': 'General',
                'paper_discussion': 'Paper Discussion',
                'question': 'Question',
                'resource': 'Resource'
            };
            return labels[category] || 'General';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadTopics() {
            const container = document.getElementById('topicsList');
            container.innerHTML = 'Loading...';

            try {
                const response = await fetch(API_URL);
                const topics = await response.json();

                if (topics.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>No topics yet. Start the first discussion!</p>
                            <a href="/new-topic.html" class="btn" style="margin-top: 1rem;">Start New Discussion</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = topics.map(topic => `
                    <div class="topic-card">
                        <h3><a href="/topic/${topic.id}">${escapeHtml(topic.title)}</a></h3>
                        <div class="topic-meta">
                            <span>By ${escapeHtml(topic.author_name)}</span>
                            <span>${new Date(topic.created_at).toLocaleDateString()}</span>
                            <span class="category-badge">${getCategoryBadge(topic.category)}</span>
                            <span>  ${topic.reply_count || 0} replies</span>
                            <span>  ${topic.upvotes || 0}</span>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = '<p>Error loading topics. Please try again.</p>';
            }
        }

        loadTopics();
    </script>
</body>
</html>
