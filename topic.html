<!DOCTYPE html>
<html>
<head>
    <title>Topic - 39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f8f9fa; color: #1a1a1a; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e5e5; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #1a2a3a; text-decoration: none; font-family: 'Courier New', Courier, monospace; }
        nav a { margin-left: 1.5rem; text-decoration: none; color: #4a5568; }
        nav a:hover { color: #1a2a3a; }
        .topic-title { font-size: 2rem; margin-bottom: 0.5rem; }
        .topic-meta { color: #6b7280; margin-bottom: 1rem; font-size: 0.9rem; }
        .topic-content { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e5e5e5; margin-bottom: 2rem; white-space: pre-wrap; }
        .reply { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #e5e5e5; margin-bottom: 1rem; }
        .reply-meta { color: #6b7280; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .reply-content { margin-bottom: 0.5rem; white-space: pre-wrap; }
        .reply-form { margin-top: 2rem; }
        .reply-form textarea { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 100px; }
        .btn { display: inline-block; background: #1a2a3a; color: white; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #2c3e50; }
        .btn-secondary { background: #e5e5e5; color: #1a1a1a; }
        .btn-secondary:hover { background: #d1d5db; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e5e5e5; color: #6b7280; font-size: 0.8rem; }
        .category-badge { display: inline-block; font-size: 0.75rem; padding: 0.15rem 0.6rem; border-radius: 12px; background: #e5e5e5; color: #4a5568; }

        .wallet-status {
            background: #f0f4ff;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            border: 1px solid #d1d9e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wallet-status .address { font-family: monospace; font-size: 0.85rem; color: #1a2a3a; }
        .wallet-status .status { font-size: 0.8rem; padding: 0.2rem 0.7rem; border-radius: 20px; }
        .wallet-status .status.connected { background: #d4edda; color: #155724; }
        .wallet-status .status.disconnected { background: #f8d7da; color: #721c24; }
        .wallet-btn { background: #1a2a3a; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .wallet-btn:hover { background: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">39 Quantum</a>
            <nav>
                <a href="/">Explore</a>
                <a href="/explanations.html">Explanations</a>
                <a href="/forum.html">Forum</a>
            </nav>
        </header>

        <!-- Wallet Status Bar -->
        <div class="wallet-status">
            <div>
                <strong>Wallet:</strong>
                <span class="address" id="walletDisplay">Not connected</span>
            </div>
            <div>
                <span class="status disconnected" id="walletStatus">Disconnected</span>
                <button class="wallet-btn" id="walletBtn">Connect Wallet</button>
            </div>
        </div>

        <div id="topicContent">
            <p>Loading...</p>
        </div>

        <div class="reply-form">
            <h3>Add a Reply</h3>
            <input type="text" id="replyAuthor" placeholder="Your name" style="width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
            <textarea id="replyContent" placeholder="Write your reply..." rows="4"></textarea>
            <button id="submitReply" class="btn">Post Reply</button>
        </div>

        <div id="repliesList" style="margin-top: 2rem;">
            <p>Loading replies...</p>
        </div>

        <div class="footer">
            <p>© 2026 39 Quantum · Read. Publish. Explain.</p>
        </div>
    </div>

    <script>
        // ========== WALLET CONNECTION ==========
        let walletAddress = null;

        const walletBtn = document.getElementById('walletBtn');
        const walletDisplay = document.getElementById('walletDisplay');
        const walletStatus = document.getElementById('walletStatus');

        async function connectWallet() {
            try {
                if (typeof window.ethereum === 'undefined') {
                    alert('Please install MetaMask or another Ethereum wallet.');
                    return;
                }
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length > 0) {
                    walletAddress = accounts[0];
                    updateWalletUI();
                }
            } catch (error) {
                console.error('Wallet connection error:', error);
                alert('Failed to connect wallet: ' + error.message);
            }
        }

        function updateWalletUI() {
            if (walletAddress) {
                walletDisplay.textContent = walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
                walletStatus.textContent = 'Connected';
                walletStatus.className = 'status connected';
                walletBtn.textContent = 'Disconnect';
            } else {
                walletDisplay.textContent = 'Not connected';
                walletStatus.textContent = 'Disconnected';
                walletStatus.className = 'status disconnected';
                walletBtn.textContent = 'Connect Wallet';
            }
        }

        walletBtn.addEventListener('click', async function() {
            if (walletAddress) {
                walletAddress = null;
                updateWalletUI();
            } else {
                await connectWallet();
            }
        });

        if (typeof window.ethereum !== 'undefined' && window.ethereum.selectedAddress) {
            walletAddress = window.ethereum.selectedAddress;
            updateWalletUI();
        }

        if (typeof window.ethereum !== 'undefined') {
            window.ethereum.on('accountsChanged', function(accounts) {
                if (accounts.length > 0) {
                    walletAddress = accounts[0];
                } else {
                    walletAddress = null;
                }
                updateWalletUI();
            });
        }

        // ========== TOPIC LOADING ==========
        // Get topic ID from URL - works with both /topic/123 and /topic.html?id=123
        const path = window.location.pathname;
        let topicId = path.split('/').pop();
        
        // If the path is /topic.html, get ID from query param
        if (path.includes('topic.html')) {
            const urlParams = new URLSearchParams(window.location.search);
            topicId = urlParams.get('id');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCategoryBadge(category) {
            const labels = {
                'general': 'General',
                'paper_discussion': 'Paper Discussion',
                'question': 'Question',
                'resource': 'Resource'
            };
            return labels[category] || 'General';
        }

        async function loadTopic() {
            const container = document.getElementById('topicContent');
            container.innerHTML = 'Loading...';

            try {
                const response = await fetch(`/api/topics/${topicId}`);
                if (!response.ok) {
                    throw new Error('Topic not found');
                }
                const data = await response.json();
                const topic = data.topic;

                container.innerHTML = `
                    <h1 class="topic-title">${escapeHtml(topic.title)}</h1>
                    <div class="topic-meta">
                        By ${escapeHtml(topic.author_name)} · ${new Date(topic.created_at).toLocaleDateString()}
                        <span class="category-badge">${getCategoryBadge(topic.category)}</span>
                    </div>
                    <div class="topic-content">
                        ${escapeHtml(topic.content)}
                    </div>
                `;

                // Load replies
                const repliesContainer = document.getElementById('repliesList');
                if (data.replies.length === 0) {
                    repliesContainer.innerHTML = '<p>No replies yet. Be the first to respond!</p>';
                    return;
                }

                repliesContainer.innerHTML = data.replies.map(reply => `
                    <div class="reply">
                        <div class="reply-meta">${escapeHtml(reply.author_name)} · ${new Date(reply.created_at).toLocaleDateString()}</div>
                        <div class="reply-content">${escapeHtml(reply.content)}</div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = `
                    <h1>Topic Not Found</h1>
                    <p>The topic you're looking for doesn't exist.</p>
                    <a href="/forum.html" class="btn">← Back to Forum</a>
                `;
            }
        }

        // ========== SUBMIT REPLY ==========
        document.getElementById('submitReply').onclick = async function() {
            const content = document.getElementById('replyContent').value;
            const author = document.getElementById('replyAuthor').value || 'Anonymous';

            if (!content) {
                alert('Please write a reply.');
                return;
            }

            const btn = this;
            btn.textContent = 'Posting...';
            btn.disabled = true;

            try {
                // Use wallet address as author, or fallback to entered name
                const authorName = walletAddress || author;

                const response = await fetch('/api/replies', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic_id: Number(topicId),
                        content,
                        author_name: authorName
                    })
                });

                if (response.status === 429) {
                    alert('Too many posts. Please wait 30 seconds.');
                } else if (response.ok) {
                    document.getElementById('replyContent').value = '';
                    loadTopic();
                } else {
                    const error = await response.json();
                    alert('Failed: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error posting reply.');
            } finally {
                btn.textContent = 'Post Reply';
                btn.disabled = false;
            }
        };

        // ========== START ==========
        loadTopic();
    </script>
</body>
</html>
