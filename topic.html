<!DOCTYPE html>
<html>
<head>
    <title>Topic - 39 Quantum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f8f9fa; color: #1a1a1a; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e5e5; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #1a2a3a; text-decoration: none; font-family: 'Courier New', Courier, monospace; }
        nav a { margin-left: 1.5rem; text-decoration: none; color: #4a5568; }
        nav a:hover { color: #1a2a3a; }
        .topic-title { font-size: 2rem; margin-bottom: 0.5rem; }
        .topic-meta { color: #6b7280; margin-bottom: 1rem; font-size: 0.9rem; }
        .topic-content { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e5e5e5; margin-bottom: 2rem; white-space: pre-wrap; }
        .reply { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #e5e5e5; margin-bottom: 1rem; }
        .reply-meta { color: #6b7280; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .reply-content { margin-bottom: 0.5rem; white-space: pre-wrap; }
        .reply-form { margin-top: 2rem; }
        .reply-form textarea { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 100px; }
        .btn { display: inline-block; background: #1a2a3a; color: white; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #2c3e50; }
        .btn-secondary { background: #e5e5e5; color: #1a1a1a; }
        .btn-secondary:hover { background: #d1d5db; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e5e5e5; color: #6b7280; font-size: 0.8rem; }
        .category-badge { display: inline-block; font-size: 0.75rem; padding: 0.15rem 0.6rem; border-radius: 12px; background: #e5e5e5; color: #4a5568; }
        .nav-btn {
    display: inline-block;
    background: #1a2a3a;
    color: white;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
    margin-left: 0.5rem;
    font-size: 0.9rem;
}

.nav-btn:hover {
    background: #2c3e50;
    color: white;
}

.btn-primary {
    display: inline-block;
    background: #1a2a3a;
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
}

.btn-primary:hover {
    background: #2c3e50;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">39 Quantum</a>
<nav>
    <a href="/" class="nav-btn">Explore</a>
    <a href="/explanations.html" class="nav-btn">Explanations</a>
    <a href="/forum.html" class="nav-btn">Forum</a>
    <a href="/new-topic.html" class="nav-btn">New Topic</a>
</nav>
        </header>

        <div id="topicContent">
            <p>Loading...</p>
        </div>

        <div class="reply-form">
            <h3>Add a Reply</h3>
            <input type="text" id="replyAuthor" placeholder="Your name" style="width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
            <textarea id="replyContent" placeholder="Write your reply..." rows="4"></textarea>
            <button id="submitReply" class="btn">Post Reply</button>
        </div>

        <div id="repliesList" style="margin-top: 2rem;">
            <p>Loading replies...</p>
        </div>

        <div class="footer">
            <p>© 2026 39 Quantum · Read. Publish. Explain.</p>
        </div>
    </div>

    <script>
        const path = window.location.pathname;
        const topicId = path.split('/').pop();

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCategoryBadge(category) {
            const labels = {
                'general': 'General',
                'paper_discussion': 'Paper Discussion',
                'question': 'Question',
                'resource': 'Resource'
            };
            return labels[category] || 'General';
        }

        async function loadTopic() {
            const container = document.getElementById('topicContent');
            container.innerHTML = 'Loading...';

            try {
                const response = await fetch(`/api/topics/${topicId}`);
                if (!response.ok) {
                    throw new Error('Topic not found');
                }
                const data = await response.json();
                const topic = data.topic;

                container.innerHTML = `
                    <h1 class="topic-title">${escapeHtml(topic.title)}</h1>
                    <div class="topic-meta">
                        By ${escapeHtml(topic.author_name)} · ${new Date(topic.created_at).toLocaleDateString()}
                        <span class="category-badge">${getCategoryBadge(topic.category)}</span>
                    </div>
                    <div class="topic-content">
                        ${escapeHtml(topic.content)}
                    </div>
                `;

                // Load replies
                const repliesContainer = document.getElementById('repliesList');
                if (data.replies.length === 0) {
                    repliesContainer.innerHTML = '<p>No replies yet. Be the first to respond!</p>';
                    return;
                }

                repliesContainer.innerHTML = data.replies.map(reply => `
                    <div class="reply">
                        <div class="reply-meta">${escapeHtml(reply.author_name)} · ${new Date(reply.created_at).toLocaleDateString()}</div>
                        <div class="reply-content">${escapeHtml(reply.content)}</div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = `
                    <h1>Topic Not Found</h1>
                    <p>The topic you're looking for doesn't exist.</p>
                    <a href="/forum.html" class="btn">← Back to Forum</a>
                `;
            }
        }

        // Submit reply
        document.getElementById('submitReply').onclick = async function() {
            const content = document.getElementById('replyContent').value;
            const author = document.getElementById('replyAuthor').value || 'Anonymous';

            if (!content) {
                alert('Please write a reply.');
                return;
            }

            const btn = this;
            btn.textContent = 'Posting...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/replies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic_id: Number(topicId),
                        content,
                        author_name: author
                    })
                });

                if (response.ok) {
                    document.getElementById('replyContent').value = '';
                    loadTopic();
                } else {
                    alert('Failed to post reply.');
                }
            } catch (error) {
                alert('Error posting reply.');
            } finally {
                btn.textContent = 'Post Reply';
                btn.disabled = false;
            }
        };

        loadTopic();
    </script>
</body>
</html>
